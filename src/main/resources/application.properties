spring.application.name=ecommerce-backend
server.port=${PORT:8080}

# ------------------------------
# PostgreSQL (Supabase Connection Pooler)
# ------------------------------
# Use port 6543 for Supavisor Pooler on Render
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:6543/postgres?prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:change_me_in_render}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# ------------------------------
# JPA / Hibernate
# ------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# HikariCP Configuration
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=0

# ------------------------------
# OAuth2 clients
# ------------------------------

# Google OAuth2 client
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:change_me_in_render}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:change_me_in_render}

# Github OAuth2 client
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:change_me_in_render}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:change_me_in_render}

# ------------------------------
# JWT secret
# ------------------------------
jwt.secret=${JWT_SECRET:change_this_jwt_secret_to_a_secure_32_byte_minimum_key}

# ------------------------------
# Gmail SMTP configuration
# ------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:change_me_in_render}
spring.mail.password=${SPRING_MAIL_PASSWORD:change_me_in_render}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3

# ------------------------------
# Cloudinary configuration
# ------------------------------
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:change_me_in_render}
cloudinary.api_key=${CLOUDINARY_API_KEY:change_me_in_render}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:change_me_in_render}

# ------------------------------
# Razorpay configuration
# ------------------------------
razorpay.keyId=${RAZORPAY_KEY_ID:change_me_in_render}
razorpay.keySecret=${RAZORPAY_KEY_SECRET:change_me_in_render}
app.base-url=${FRONTEND_URL:http://localhost:5173}
app.backend-url=${BACKEND_URL:http://localhost:8080}

# ------------------------------
# Payment session TTL
# ------------------------------
payment.session.ttl.minutes=60
payment.expire-check-cron=0 */1 * * * *

# ------------------------------
# Google Gemini AI Configuration
# ------------------------------
spring.ai.model.chat=google-genai
spring.ai.openai.chat.enabled=false
spring.ai.google.genai.api-key=${GEMINI_API_KEY:change_me_in_render}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

