services:
  - type: web
    name: ecommerce-backend
    runtime: docker
    region: ohio # Change to your preferred region
    plan: free # Use 'free' for free tier or 'starter' for better performance
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        sync: false # Set this in Render dashboard
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://ec-kart.netlify.app/
      - key: BACKEND_URL
        sync: false # Set this to your Render service URL (e.g. https://ecommerce-backend.onrender.com)
      - key: JWT_SECRET
        generateValue: true # Render can generate a secure secret for you
      - key: ELASTICSEARCH_URI
        sync: false # Set this to your Elasticsearch URL (e.g., https://your-domain.es.us-east-1.aws.found.io:9200)
      - key: ELASTICSEARCH_USERNAME
        value: elastic
      - key: ELASTICSEARCH_PASSWORD
        sync: false # Set this to your Elasticsearch password
      - key: ELASTICSEARCH_SSL_VERIFICATION_MODE
        value: full # Use 'full' for production, 'none' for development
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false

